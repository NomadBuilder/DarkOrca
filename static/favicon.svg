<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient matching the site's dark theme and red accent -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05060b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b0d16;stop-opacity:1" />
    </linearGradient>
    <!-- Red accent gradient matching --accent: #ff6b6b -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c43434;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners matching site's dark theme -->
  <rect width="100" height="100" rx="12" fill="url(#bgGrad)"/>
  
  <!-- Shield shape with subtle border -->
  <path d="M50 18 L28 24 L28 40 Q28 58 50 75 Q72 58 72 40 L72 24 Z" 
        fill="none" 
        stroke="url(#accentGrad)" 
        stroke-width="2.5"
        opacity="0.9"/>
  
  <!-- Inner shield with gradient fill -->
  <path d="M50 20 L30 25.5 L30 40 Q30 56 50 72 Q70 56 70 40 L70 25.5 Z" 
        fill="url(#accentGrad)" 
        opacity="0.25"/>
  
  <!-- Checkmark inside shield matching the accent color -->
  <path d="M40 48 L46 54 L60 40" 
        fill="none" 
        stroke="#ff6b6b" 
        stroke-width="4" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.95"/>
  
  <!-- Subtle glow effect -->
  <path d="M50 18 L28 24 L28 40 Q28 58 50 75 Q72 58 72 40 L72 24 Z" 
        fill="none" 
        stroke="#ff6b6b" 
        stroke-width="1" 
        opacity="0.3"/>
</svg>
